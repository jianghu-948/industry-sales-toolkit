<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>影刀 RPA 行业销售工具包</title>
<style>
:root{
  --blue:#2563eb;--cyan:#0891b2;--line:#d7e1ef;
  --shadow:0 18px 42px rgba(15,23,42,.08);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;overflow:hidden}
body{
  background:radial-gradient(circle at 18% 0%,#fff 0,#eef3f8 38%,#e7eef8 100%);
  color:#0f172a;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
  display:flex;flex-direction:column;
}
/* —— header —— */
.header{
  flex:0 0 auto;
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
  box-shadow:0 8px 22px rgba(15,23,42,.04);
  padding:14px 20px 10px;
}
.header-inner{
  max-width:900px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  gap:18px;flex-wrap:wrap;
}
.header-title{
  font-size:22px;font-weight:950;letter-spacing:-.03em;
  white-space:nowrap;
}
.header-title span{
  font-weight:400;font-size:13px;color:#667085;
  display:block;letter-spacing:0;
}
/* —— industry tabs —— */
.industry-tabs{
  display:flex;gap:6px;flex-wrap:wrap;
}
.industry-tab{
  border:1.5px solid var(--line);
  background:#f8fafc;
  color:#334155;
  border-radius:14px;
  padding:10px 18px;
  display:flex;align-items:center;gap:10px;
  cursor:pointer;
  transition:.18s ease;
  font-size:14px;font-weight:800;
  white-space:nowrap;
}
.industry-tab .idx{
  width:28px;height:28px;border-radius:9px;
  background:#eef4ff;color:#1d4ed8;
  display:flex;align-items:center;justify-content:center;
  font-weight:950;font-size:13px;flex:0 0 auto;
}
.industry-tab:hover{
  border-color:#93c5fd;background:#eff6ff;
}
.industry-tab.active{
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  color:#fff;border-color:transparent;
  box-shadow:0 10px 22px rgba(37,99,235,.20);
}
.industry-tab.active .idx{
  background:rgba(255,255,255,.18);color:#fff;
}
/* —— iframe —— */
.frame-wrap{
  flex:1 1 auto;position:relative;
}
.frame-wrap iframe{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  border:none;display:block;
}
/* —— responsive —— */
@media(max-width:720px){
  .header{padding:10px 12px 8px;}
  .header-inner{flex-direction:column;align-items:flex-start;gap:8px;}
  .header-title{font-size:18px;}
  .industry-tabs{width:100%;}
  .industry-tab{flex:1;justify-content:center;padding:10px 12px;font-size:13px;}
  .industry-tab .idx{width:24px;height:24px;font-size:11px;}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-title">
      影刀 RPA 行业销售工具包
      <span>Industry Sales Toolkit</span>
    </div>
    <nav class="industry-tabs">
      <button class="industry-tab active" data-industry="semiconductor">
        <span class="idx">01</span>半导体
      </button>
      <button class="industry-tab" data-industry="newenergy">
        <span class="idx">02</span>新能源
      </button>
      <button class="industry-tab" data-industry="healthcare">
        <span class="idx">03</span>医疗健康
      </button>
    </nav>
  </div>
</header>

<div class="frame-wrap">
  <iframe id="contentFrame" src="半导体行业销售工具包.html" title="行业销售工具包"></iframe>
</div>

<script>
(function(){
  var tabs = document.querySelectorAll('.industry-tab');
  var frame = document.getElementById('contentFrame');

  var urls = {
    semiconductor: '半导体行业销售工具包.html',
    newenergy: '新能源行业销售工具包.html',
    healthcare: '医疗健康行业销售工具包.html'
  };

  tabs.forEach(function(btn){
    btn.addEventListener('click', function(){
      var industry = btn.dataset.industry;
      if (!industry || btn.classList.contains('active')) return;

      tabs.forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      frame.src = urls[industry];
    });
  });

  // Restore last selected industry from sessionStorage
  var last = sessionStorage.getItem('activeIndustry');
  if (last && urls[last] && last !== 'semiconductor') {
    tabs.forEach(function(b){ b.classList.remove('active'); });
    var target = document.querySelector('.industry-tab[data-industry="' + last + '"]');
    if (target) { target.classList.add('active'); frame.src = urls[last]; }
  }

  // Remember selection
  tabs.forEach(function(btn){
    btn.addEventListener('click', function(){
      if (btn.dataset.industry) sessionStorage.setItem('activeIndustry', btn.dataset.industry);
    });
  });
})();
</script>

</body>
</html>
